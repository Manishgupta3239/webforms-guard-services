<!DOCTYPE html>
<html>

<head>
    <META HTTP-EQUIV='content-type' CONTENT='text/html; charset=UTF-8'>
    <style>
        /* Guard Services USA – dark theme (match site: dark grey/black, white text, gold CTA) */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a url('backgroundImange.jpg') center center / 100% 120% no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 26, 0.4);
            z-index: 0;
            pointer-events: none;
        }

        #zohoSupportWebToCase {
            position: relative;
            z-index: 1;
            padding: 0;
            max-height: 100%;
            overflow: auto;
        }

        .gsu-header-logo {
            display: block;
            max-height: 44px;
            width: auto;
            margin-bottom: 4px;
            vertical-align: middle;
        }

        #zohoSupportWebToCase textarea,
        #zohoSupportWebToCase input[type='text'],
        #zohoSupportWebToCase input[type='date'],
        #zohoSupportWebToCase select,
        .wb_common {
            width: 280px;
        }

        #zohoSupportWebToCase td {
            padding: 6px 10px;
        }

        #zohoSupportWebToCase textarea,
        #zohoSupportWebToCase input[type='text'],
        #zohoSupportWebToCase input[type='date'],
        #zohoSupportWebToCase select {
            border: 1px solid #ccc;
            padding: 6px 10px;
            border-radius: 6px;
            background-color: #fff;
            font-size: 13px;
            color: #1a1a1a;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #zohoSupportWebToCase textarea::placeholder,
        #zohoSupportWebToCase input[type='text']::placeholder,
        #zohoSupportWebToCase input[type='date']::placeholder {
            color: #666;
        }

        #zohoSupportWebToCase textarea:focus,
        #zohoSupportWebToCase input[type='text']:focus,
        #zohoSupportWebToCase input[type='date']:focus,
        #zohoSupportWebToCase select:focus {
            outline: none;
            border-color: #c9a227;
            box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.35);
        }

        #zohoSupportWebToCase textarea {
            min-height: 60px;
            resize: vertical;
        }

        #zohoSupportWebToCase select {
            box-sizing: unset;
            color: #1a1a1a;
        }

        #zohoSupportWebToCase select option {
            background: #fff;
            color: #1a1a1a;
        }

        #zohoSupportWebToCase .wb_selectDate {
            width: auto;
        }

        #zohoSupportWebToCase input.wb_cusInput {
            width: 108px;
        }

        .wb_FtCon {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 15px;
            padding-left: 10px;
        }

        .wb_logoCon {
            display: flex;
            margin-left: 5px;
        }

        .wb_logo {
            max-width: 16px;
            max-height: 16px;
        }

        #zohoSupportWebToCase .wb_multi_pick {
            border: 1px solid #334155;
            padding: 6px 10px;
            border-radius: 6px;
            width: 280px;
            height: 75px;
            overflow-y: auto;
            background-color: #f8fafc;
            color: #1e293b;
        }

        #zohoSupportWebToCase .wb_multi_pick_label {
            display: block;
            color: #e2e8f0;
        }

        #zohoSupportWebToCase .wb_multi_pick_input,
        .wb_multi_pick_input_all {
            vertical-align: middle;
            margin-right: 5px;
        }

        .zsFormClass {
            width: 560px;
            max-width: 94%;
            margin: 0 auto;
            background: #1e3a5f;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            border: 1px solid #2d4a6f;
        }

        .zsFormClass tr:first-child td {
            background: #1a365d;
            color: #fff;
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid #2d4a6f;
        }

        .zsFormClass tr:first-child td strong {
            font-size: 22px;
            font-weight: 700;
            text-transform: none;
            letter-spacing: 0;
            display: block;
            margin-bottom: 4px;
            color: #fff;
        }

        .zsFormClass tr:nth-child(2) td {
            padding: 0 16px 8px;
            background: #1a365d;
            color: #94a3b8;
            border-bottom: 1px solid #2d4a6f;
        }

        .zsFormClass tr:nth-child(n+3) td {
            border-bottom: 1px solid #2d4a6f;
        }

        .zsFormClass tr:last-child td,
        .zsFormClass tr:nth-last-child(2) td {
            border-bottom: none;
        }

        .gsu-submit-cell {
            padding: 8px 5px 4px 5px !important;
        }
    </style>
    <style>
        .zsFontClass {
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 13px;
        }

        .zsFormClass .zsFontClass {
            font-weight: 500;
            color: #e2e8f0;
        }
    </style>

        #tooltip-zc {

            line-height: 18px;

            background: #1e3a5f;
            border: 1px solid #2d4a6f;

            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 10000;
        }

        .wtcmanfield {
            color: #fca5a5;
            font-size: 16px;
            position: relative;
            top: 2px;
            left: 1px;
        }

        #zsCloudAttachmentIframe {
            width: 100%;
            height: 100%;
            z-index: 99999 !important;
            position: fixed;
            left: 0px;
            top: 0px;
            border-style: none;
            display: none;
            background-color: #fff;
        }

        .wtchelpinfo {
            background-position: -246px -485px;
            width: 15px;
            height: 15px;
            display: inline-block;
            position: relative;
            top: 2px;
            background-image: url(https://static.zohocdn.com/zohodeskstatic/app/images/zs-mpro.b6c9cf2347c62390fdcb.png);
        }

        .zsMaxSizeMessage,
        #zsMaxSizeMessage,
        #zsMaxLimitMessage {
            font-size: 11px;
            color: #94a3b8 !important;
        }

        #zohoSupportWebToCase input[type='submit'] {
            background: #c9a227;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        #zohoSupportWebToCase input[type='submit']:hover {
            background: #d4ab2e;
            transform: translateY(-1px);
        }

        #zohoSupportWebToCase input[type='submit']:active {
            transform: translateY(0);
        }

        #zohoSupportWebToCase input[type='button'] {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        #zohoSupportWebToCase input[type='button']:hover {
            background: #2d4a6f;
            color: #e2e8f0;
            border-color: #64748b;
        }

        .wb_FtCon {
            color: #94a3b8;
            font-size: 11px;
        }

        .wb_FtCon a {
            color: #94a3b8;
        }

        .wb_FtCon a:hover {
            color: #c9a227;
        }
